spec_version: 1
name: asc_agent_under_demand_uncertainity_rl_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy_phase_inventory
    name: "Easy Inventory Management — Cooperative Supplier"
    description: "Manage perishable inventory with a cooperative Gold-tier supplier under stable demand. Learn basic ordering, sell-side pricing, and supplier negotiation."
    difficulty: easy
    max_steps: 30

  - id: medium_phase_inventory
    name: "Medium Inventory Management — Neutral Supplier"
    description: "Manage seasonal perishable inventory with a Silver-tier supplier under variable demand and lead times. Maintain supplier relationship through consistent orders and concrete negotiation offers."
    difficulty: medium
    max_steps: 30

  - id: hard_phase_inventory
    name: "Hard Inventory Management — Adversarial Supplier + Crisis"
    description: "Manage volatile perishable inventory with a Bronze-tier supplier. Survive a day-21 supply disruption crisis by building supplier loyalty through strategic negotiation and consistent ordering."
    difficulty: hard
    max_steps: 30
